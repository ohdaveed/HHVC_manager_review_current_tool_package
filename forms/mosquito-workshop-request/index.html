<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Request a mosquito education workshop | SF.gov</title>
    <link rel="stylesheet" href="/css/styles.css" />
    <link rel="stylesheet" href="/css/ux-improvements.css" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="form-shell">
      <header class="form-header">
        <div class="eyebrow">HHVC outreach</div>
        <h1>Request a free mosquito education workshop</h1>
        <p class="summary">
          Tell us about your school, summer camp, museum, or science fair event. Healthy Housing and
          Vector Control will follow up about availability.
        </p>
      </header>
      <!-- Netlify Forms detection (fields mirrored in src/main.js) -->
      <form
        name="mosquito-workshop-request"
        data-netlify="true"
        netlify-honeypot="bot-field"
        hidden
      >
        <input name="organization" />
        <input name="contactName" />
        <input name="email" />
        <input name="phone" />
        <input name="organizationType" />
        <input name="audienceAge" />
        <input name="groupSize" />
        <input name="preferredDates" />
        <input name="eventLocation" />
        <input name="spaceType" />
        <input name="electricity" />
        <textarea name="notes"></textarea>
        <input name="bot-field" />
      </form>
      <main id="app"></main>
    </div>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>

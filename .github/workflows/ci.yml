# CI for the HHVC manager-review mockup tool.
#
# Mirrors the local pre-commit gauntlet documented in AGENTS.md:
#   format:check  — Prettier is the ONLY linter in this repo (no ESLint/tsc)
#   validate      — Zod schema + business invariants over pages/*.js
#   test          — the 7 Bun unit-test files under tests/
#   test:e2e      — the 9 Playwright specs under tests/e2e/
#
# Unit checks and the (slower, browser-downloading) e2e suite run as separate
# jobs so a formatting or schema failure reports in seconds without waiting on
# a Chromium download, and so a flaky browser run never masks a unit failure.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    name: Format, validate, unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # index.html links node_modules/@sfgov/design-system CSS directly, and
      # validate/test load pages through node_modules deps (zod, fast-glob).
      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Prettier check (the lint step)
        run: bun run format:check

      - name: Validate page data (Zod schema + invariants)
        run: bun run validate

      - name: Unit tests (bun test)
        run: bun run test

      # The Netlify bundle assembly doubles as a deploy-integrity check: it
      # fails if the committed workshop-form dist references assets that were
      # never committed (the "form shell that never hydrates" regression).
      - name: Netlify bundle assembly (deploy-integrity check)
        run: bun run build:netlify

  e2e:
    name: Playwright end-to-end tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: bun run test:e2e

      # The HTML report (with on-first-retry traces) is the fastest way to
      # debug a red e2e run without reproducing it locally.
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
